name: Import portfolio assets

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/import-assets.yml"

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download portfolio media
        run: |
          mkdir -p public/assets
          curl --fail --location --retry 3 --output "public/assets/cool-ai.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/cool-ai.jpg"
          curl --fail --location --retry 3 --output "public/assets/id-back.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/id-back.jpg"
          curl --fail --location --retry 3 --output "public/assets/id-front.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/id-front.jpg"
          curl --fail --location --retry 3 --output "public/assets/kaixuan-sketch-cutout.png" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/kaixuan-sketch-cutout.png"
          curl --fail --location --retry 3 --output "public/assets/kaixuan-sketch.png" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/kaixuan-sketch.png"
          curl --fail --location --retry 3 --output "public/assets/market-pulse.mp4" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/market-pulse.mp4"
          curl --fail --location --retry 3 --output "public/assets/profile.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/profile.jpg"
          curl --fail --location --retry 3 --output "public/assets/project-cyia.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-cyia.jpg"
          curl --fail --location --retry 3 --output "public/assets/project-gic-tsc.jpeg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-gic-tsc.jpeg"
          curl --fail --location --retry 3 --output "public/assets/project-pennsem.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-pennsem.jpg"
          curl --fail --location --retry 3 --output "public/assets/project-quantum-life.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-quantum-life.jpg"
          curl --fail --location --retry 3 --output "public/assets/project-sic-champion.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-sic-champion.jpg"
          curl --fail --location --retry 3 --output "public/assets/project-trading-engine.png" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-trading-engine.png"
          curl --fail --location --retry 3 --output "public/assets/project-youth-community.png" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/project-youth-community.png"
          curl --fail --location --retry 3 --output "public/assets/taiwan-shanghai-finance-sketch.png" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/taiwan-shanghai-finance-sketch.png"
          curl --fail --location --retry 3 --output "public/assets/travel-1.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/travel-1.jpg"
          curl --fail --location --retry 3 --output "public/assets/travel-2.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/travel-2.jpg"
          curl --fail --location --retry 3 --output "public/assets/travel-3.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/travel-3.jpg"
          curl --fail --location --retry 3 --output "public/assets/travel-4.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/travel-4.jpg"
          curl --fail --location --retry 3 --output "public/assets/travel-5.jpg" "https://kaixuan-huang-portfolio.kaixuanhuang293.chatgpt.site/assets/travel-5.jpg"
      - name: Commit imported assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets
          if git diff --cached --quiet; then
            echo "Assets already current"
          else
            git commit -m "Import portfolio media assets"
            git push
          fi
